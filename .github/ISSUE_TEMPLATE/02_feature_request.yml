name: Feature Request
description: "Have a great new idea? Please search through our existing feature requests, and upvote it if it's already exists."
labels: ["enhancement"]
body:
  - type: checkboxes
    attributes:
      label: "Pre-submit Checks"
      options:
        - label: "I have searched existing local-first fork feature requests and there are no duplicates"
          required: true
  - type: textarea
    id: "describe-solution"
    attributes:
      label: "Describe the solution you'd like?"
      description: "A clear and concise description of what you want to happen."
    validations:
      required: true
  - type: textarea
    id: "related-to-problem"
    attributes:
      label: "Is your feature request related to a problem? Please describe."
      description: "A clear and concise description of what the problem is."
      placeholder: "I'm always frustrated when [...]"
    validations:
      required: false
  - type: textarea
    id: "additional-context"
    attributes:
      label: "Additional context"
      description: "Add any other context or screenshots about the feature request here. If you want to upload a picture you can drag one in from Finder."
    validations:
      required: false
  - type: dropdown
    id: "os"
    attributes:
      label: "Operating system (OS)"
      multiple: false
      options:
        - "Select an OS"
        - macOS
        - Linux
        - Windows
        - Cross-platform
    validations:
      required: true
  - type: dropdown
    id: "importance"
    attributes:
      label: "How important is this feature to you?"
      multiple: false
      options:
        - "1 (Not too important)"
        - "2"
        - "3"
        - "4"
        - "5 (Can't work without it!)"
    validations:
      required: true
